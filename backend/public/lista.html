<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Presenças</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; }
    nav { background: #1a73e8; color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    nav h1 { font-size: 18px; }
    nav a { color: white; text-decoration: none; background: rgba(255,255,255,0.2); padding: 6px 14px; border-radius: 6px; }
    .container { max-width: 900px; margin: 32px auto; padding: 0 16px; }
    .filters { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .filter-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 150px; }
    label { font-size: 12px; font-weight: 600; color: #666; text-transform: uppercase; }
    select, input { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    .btn { background: #1a73e8; color: white; border: none; padding: 9px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .table-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 12px; border-bottom: 2px solid #eee; font-size: 12px; text-transform: uppercase; color: #666; }
    td { padding: 12px; border-bottom: 1px solid #f5f5f5; }
    tr:hover { background: #f9f9f9; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
    .badge-presente { background: #e8f5e9; color: #2e7d32; }
    .empty { text-align: center; padding: 40px; color: #999; }
  </style>
</head>
<body>
  <nav>
    <h1>📊 Lista de Presenças</h1>
    <a href="/dashboard">Voltar</a>
  </nav>
  <div class="container">
    <div class="filters">
      <div class="filter-group">
        <label>Sala</label>
        <select id="filter-sala"><option value="">Todas</option></select>
      </div>
      <div class="filter-group">
        <label>Data</label>
        <input type="date" id="filter-data">
      </div>
      <button class="btn" onclick="loadPresencas()">Filtrar</button>
    </div>
    <div class="table-card">
      <table>
        <thead><tr><th>Aluno</th><th>Sala</th><th>Data/Hora</th><th>Status</th></tr></thead>
        <tbody id="tbody"><tr><td colspan="4" class="empty">Carregando...</td></tr></tbody>
      </table>
    </div>
  </div>
  <script>
    fetch('/api/salas').then(r=>r.json()).then(salas=>{
      const sel=document.getElementById('filter-sala');
      sel.innerHTML+= salas.map(s=>`<option value="${s.id}">${s.nome}</option>`).join('');
    });
    document.getElementById('filter-data').value = new Date().toISOString().split('T')[0];
    function loadPresencas(){
      const sala=document.getElementById('filter-sala').value;
      const data=document.getElementById('filter-data').value;
      let url='/api/presencas?';
      if(sala) url+=`sala_id=${sala}&`;
      if(data) url+=`data=${data}`;
      fetch(url).then(r=>r.json()).then(rows=>{
        const tbody=document.getElementById('tbody');
        if(!rows.length){ tbody.innerHTML='<tr><td colspan="4" class="empty">Nenhuma presença encontrada.</td></tr>'; return; }
        tbody.innerHTML=rows.map(r=>`<tr><td>${r.alunos?.nome||r.aluno_id}</td><td>${r.salas?.nome||r.sala_id}</td><td>${new Date(r.timestamp).toLocaleString('pt-BR')}</td><td><span class="badge badge-presente">Presente</span></td></tr>`).join('');
      });
    }
    loadPresencas();
  </script>
</body>
</html>
