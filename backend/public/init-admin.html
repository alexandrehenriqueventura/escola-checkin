<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicializar Administrador</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
        }
        h1 { color: #333; margin-bottom: 10px; font-size: 24px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        .info { background: #e3f2fd; padding: 15px; border-radius: 5px; margin-bottom: 20px; border-left: 4px solid #2196f3; }
        .info p { color: #1976d2; font-size: 14px; line-height: 1.5; }
        button {
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background: #5568d3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            display: none;
        }
        .message.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block; }
        .message.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔑 Inicializar Administrador</h1>
        <p class="subtitle">Configure o primeiro administrador do sistema</p>
        
        <div class="info">
            <p><strong>ℹ️ Atenção:</strong> Esta ação só pode ser executada uma vez. Você será cadastrado como o primeiro administrador do sistema.</p>
        </div>

        <button id="initBtn" onclick="initAdmin()">Cadastrar como Administrador</button>
        
        <div id="message" class="message"></div>
    </div>

    <script>
        async function initAdmin() {
            const btn = document.getElementById('initBtn');
            const msg = document.getElementById('message');
            
            btn.disabled = true;
            btn.textContent = 'Processando...';
            msg.className = 'message';
            msg.textContent = '';

            try {
                const response = await fetch('/api/admin/init-admin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                const data = await response.json();

                if (response.ok) {
                    msg.className = 'message success';
                    msg.textContent = '✅ ' + data.message + ' Redirecionando...';
                    setTimeout(() => {
                        window.location.href = '/admin';
                    }, 2000);
                } else {
                    msg.className = 'message error';
                    msg.textContent = '❌ ' + (data.error || 'Erro ao cadastrar administrador.');
                    btn.disabled = false;
                    btn.textContent = 'Tentar Novamente';
                }
            } catch (error) {
                msg.className = 'message error';
                msg.textContent = '❌ Erro de conexão. Verifique sua autenticação.';
                btn.disabled = false;
                btn.textContent = 'Tentar Novamente';
            }
        }
    </script>
</body>
</html>
