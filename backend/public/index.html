<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escola Check-in - Login</title>
  <style>
    body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f2f5; }
    .container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 2px 20px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; }
    h1 { color: #333; margin-bottom: 8px; }
    p { color: #666; margin-bottom: 30px; }
    .btn-google { display: inline-flex; align-items: center; gap: 12px; background: #fff; border: 2px solid #ddd; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 16px; text-decoration: none; color: #333; transition: all 0.2s; }
    .btn-google:hover { border-color: #4285f4; box-shadow: 0 2px 8px rgba(66,133,244,0.3); }
    .btn-google img { width: 24px; }
    .escola { font-size: 48px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="escola">🏫</div>
    <h1>Escola Check-in</h1>
    <p>Sistema de controle de presença por QR Code</p>
    <a href="/auth/google" class="btn-google">
      <img src="https://developers.google.com/identity/images/g-logo.png" alt="Google">
      Entrar com Google
    </a>
  </div>
</body>
</html>
